<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Minicode</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',system-ui,sans-serif;font-size:14px;color:#1d1d1f;background:#f5f5f7;display:flex}
#sidebar{width:240px;background:rgba(255,255,255,.95);backdrop-filter:blur(40px);border-right:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.05)}
#sidebar-header h2{font-size:13px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em}
#new-session{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:#1d1d1f;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#new-session:hover{background:rgba(0,0,0,.06)}
#session-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#515154;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:background .15s}
.session-item:hover{background:rgba(0,0,0,.06)}
.session-item.active{background:rgba(0,0,0,.1);color:#1d1d1f;font-weight:500}
#sidebar-footer{padding:12px 16px;border-top:1px solid rgba(0,0,0,.05);font-size:11px;color:#86868b}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 20px;border-bottom:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.7);backdrop-filter:blur(40px)}
#topbar h1{font-size:13px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em}
#messages{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;background:transparent}
#messages:empty::after{content:'新会话已创建，输入消息开始对话';display:block;text-align:center;color:#86868b;padding:60px 0;font-size:13px}
.msg{padding:10px 14px;line-height:1.6;font-size:14px;color:#1d1d1f;animation:fi .2s ease;max-width:90%}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;font-weight:500}
.msg.assistant{align-self:flex-start}
.msg pre{background:#f5f5f7;border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:14px;margin:8px 0;overflow-x:auto;position:relative}
.msg pre code{font-family:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;line-height:1.5;display:block;white-space:pre;color:#1d1d1f}
.msg pre .lang{position:absolute;top:5px;right:10px;font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:.03em}
.msg code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace}
.msg p{margin:4px 0}
.msg.error{color:#d32f2f;font-size:13px;text-align:center;width:100%;max-width:100%;padding:8px}
#input-area{padding:8px 20px 16px;flex-shrink:0}
#input-wrap{max-width:720px;margin:0 auto;display:flex;gap:8px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
#input-wrap:focus-within{border-color:rgba(0,0,0,.2);box-shadow:0 2px 12px rgba(0,0,0,.08)}
#input{flex:1;border:none;outline:none;padding:8px 12px;font-size:14px;font-family:inherit;resize:none;min-height:36px;max-height:120px;line-height:1.4;color:#1d1d1f;background:transparent}
#input::placeholder{color:#aaa}
#send{width:36px;height:36px;border-radius:8px;border:none;background:#1d1d1f;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
#send:hover{background:#000}
#send:disabled{opacity:.25;cursor:default;background:#1d1d1f}
#send svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#model-bar{max-width:720px;margin:4px auto 0;display:flex;align-items:center;gap:8px;padding:0 4px}
#model-bar label{font-size:11px;color:#86868b;white-space:nowrap}
#model-select{-webkit-appearance:none;appearance:none;background:transparent;border:none;padding:2px 0;font-size:12px;color:#515154;cursor:pointer;outline:none;font-family:inherit;max-width:260px}
#model-select:hover{color:#1d1d1f}
.thinking{text-align:center;padding:4px 20px 8px;font-size:13px;color:#86868b;flex-shrink:0}
.thinking span{display:inline-flex;align-items:center;gap:4px}
.thinking .dot{width:4px;height:4px;border-radius:50%;background:#86868b;animation:bo 1.4s infinite}
.thinking .dot:nth-child(2){animation-delay:.2s}
.thinking .dot:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{opacity:.3}30%{opacity:1}}
.ready-hide{display:none}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>对话</h2>
    <button id="new-session" onclick="newSession()" title="新建对话">+</button>
  </div>
  <div id="session-list"></div>
  <div id="sidebar-footer">Minicode</div>
</div>

<div id="main">
  <div id="topbar"><h1>Minicode</h1></div>
  <div id="messages"></div>
  <div class="thinking ready-hide" id="thinking"><span>思考中<span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="输入消息..." disabled></textarea>
      <button id="send" disabled>
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
    <div id="model-bar">
      <label>模型</label>
      <select id="model-select"><option>加载中...</option></select>
    </div>
  </div>
</div>

<script>
let sessions = []
let currentSessionId = null
let loading = false
let ready = false

function id(name) { return document.getElementById(name) }

async function api(path, opts) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...(opts || {}) })
  if (!r.ok) {
    let msg = r.statusText
    try { const j = await r.json(); msg = j.error || msg } catch {}
    throw new Error(msg)
  }
  return r.json()
}

async function init() {
  try {
    await loadModels()
    await loadSessions()
  } catch (e) { console.error('init error:', e) }
  ready = true
  id('input').disabled = false
  id('input').focus()
  autoResize()
}
setTimeout(init, 10)

async function loadModels() {
  const sel = id('model-select')
  const d = await api('/api/models')
  sel.innerHTML = ''
  for (const m of d.models || []) {
    const opt = document.createElement('option')
    opt.value = m.id
    opt.textContent = m.label || m.id
    if (m.id === d.default) opt.selected = true
    sel.appendChild(opt)
  }
}

async function loadSessions() {
  const d = await api('/api/sessions')
  sessions = d.sessions || []
  renderSessionList()
  if (sessions.length > 0) { await selectSession(sessions[0].id) }
  else { await newSession() }
}

function renderSessionList() {
  const el = id('session-list')
  el.innerHTML = ''
  for (const s of sessions) {
    const div = document.createElement('div')
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '')
    div.textContent = s.name || s.id.slice(0, 8)
    div.onclick = () => selectSession(s.id)
    el.appendChild(div)
  }
}

async function selectSession(id) {
  currentSessionId = id
  renderSessionList()
  try {
    const d = await api('/api/sessions/' + id + '/messages')
    renderMessages(d.messages || [])
  } catch { renderMessages([]) }
}

async function newSession() {
  const model = id('model-select').value
  const d = await api('/api/sessions', { method: 'POST', body: JSON.stringify({ model }) })
  sessions.push({ id: d.id, name: d.name || '新对话' })
  currentSessionId = d.id
  renderSessionList()
  renderMessages([])
  id('input').focus()
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

function renderText(text) {
  let html = '', i = 0
  while (i < text.length) {
    const start = text.indexOf('```', i)
    if (start === -1) { html += '<p>' + esc(text.slice(i)).replace(/\n/g, '<br>') + '</p>'; break }
    html += '<p>' + esc(text.slice(i, start)).replace(/\n/g, '<br>') + '</p>'
    const end = text.indexOf('```', start + 3)
    if (end === -1) { html += '<p>' + esc(text.slice(start)).replace(/\n/g, '<br>') + '</p>'; break }
    const block = text.slice(start + 3, end)
    const nl = block.indexOf('\n')
    const lang = nl === -1 ? '' : block.slice(0, nl).trim()
    const code = nl === -1 ? block : block.slice(nl + 1)
    html += '<pre><span class="lang">' + (lang || 'code') + '</span><code>' + esc(code) + '</code></pre>'
    i = end + 3
  }
  return html
}

function renderMessages(msgs) {
  const el = id('messages')
  el.innerHTML = ''
  for (const m of msgs) {
    if (m.role === 'system' || m.role === 'tool') continue
    const div = document.createElement('div')
    div.className = 'msg ' + (m.role === 'assistant' ? 'assistant' : 'user')
    if (m.role === 'assistant') { div.innerHTML = renderText(m.content || '') }
    else { div.textContent = m.content || '' }
    el.appendChild(div)
  }
  el.scrollTop = el.scrollHeight
}

function addMsg(role, content) {
  const el = id('messages')
  const div = document.createElement('div')
  div.className = 'msg ' + role
  if (role === 'assistant') { div.innerHTML = renderText(content) }
  else { div.textContent = content }
  el.appendChild(div)
  el.scrollTop = el.scrollHeight
}

function autoResize() {
  const el = id('input')
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  id('send').disabled = !ready || loading || !el.value.trim()
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
}

async function send() {
  if (!ready || loading || !currentSessionId) return
  const input = id('input')
  const text = input.value.trim()
  if (!text) return
  input.value = ''
  autoResize()
  addMsg('user', text)
  loading = true
  id('send').disabled = true
  id('thinking').classList.remove('ready-hide')
  try {
    const d = await api('/api/sessions/' + currentSessionId + '/chat', { method: 'POST', body: JSON.stringify({ prompt: text }) })
    if (d.text) addMsg('assistant', d.text)
    const si = sessions.find(s => s.id === currentSessionId)
    if (si && d.name) si.name = d.name
    renderSessionList()
  } catch (e) {
    addMsg('error', '错误: ' + e.message)
  }
  loading = false
  id('send').disabled = false
  id('thinking').classList.add('ready-hide')
  input.focus()
}
</script>
</body>
</html>
